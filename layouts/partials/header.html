<header class="site-header">
	<nav class="site-nav">
		<a class="site-title" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
		<div class="nav-links">
			{{ range .Site.Menus.main }}
				<a class="nav-link" href="{{ .URL }}">{{ .Name }}</a>
			{{ end }}
			{{ if templates.Exists "partials/surprise-me-head.html" }}
				<a class="nav-link" href="{{ "surprise-me" | absURL }}">Surprise Me!</a>
			{{ end }}
			<a class="nav-link" href="{{ "feed.xml" | absURL }}">RSS</a>
		</div>
	</nav>
</header>
