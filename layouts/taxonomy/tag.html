{{ partial "head.html" . }}
<body>
	{{ partial "header.html" . }}
	<p class="archive-section-title">#{{ .Title | lower }}</p>
	{{ range .Paginator.Pages }}
		{{ partial "li.html" . }}
	{{ end }}
	{{ partial "pagination.html" . }}
	{{ partial "footer.html" . }}
	{{ partial "custom_footer.html" . }}
	{{ range .Site.Params.plugins_js }}
		<script src="{{ . }}"></script>
	{{ end }}
</body>
</html>
