# theme.toml template for a Hugo theme
# See https://github.com/spf13/hugoThemes#themetoml for an example

name = "Practical Tufte"
license = "MIT"
licenselink = "https://github.com/pimoore/theme-tufte/blob/main/LICENSE.md"
description = "A Micro.blog theme inspired by Butterick's Practical Typography, built on the Tufte theme by Pete Moore. Uses Equity font and a three-column layout with margin notes."
homepage = "https://github.com/pimoore/theme-tufte"
tags = ["blog", "minimal", "typography"]
features = ["blog", ""]
min_version = 0.20

[author]
  name = "Elliot Clowes"